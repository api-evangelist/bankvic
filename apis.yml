apis:
- aid: bankvic:bankvic-cdr-product-reference-data-api
  name: BankVic CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankvic.com.au/get-help/open-banking/
  baseURL: https://ib.bankvic.com.au/openbanking/cds-au/v1
  properties:
  - url: https://www.bankvic.com.au/get-help/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/bankvic-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API exposing BankVic's product catalogue (accounts, loans, term deposits, credit
    cards) with terms, conditions, and key features. Live at the standard CDS path
    GET /banking/products and GET /banking/products/{productId}; confirmed returning
    HTTP 200 with x-v 4 and a data.products array (55 products across 11 pages). The
    contract conforms to the shared DSB Consumer Data Standards, not a bank-proprietary
    specification.
