    type: APIReference
  - url: openapi/bankvic-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right surface for authorised direct-debit
    arrangements and scheduled/recurring payments, covering the standardized DSB CDS
    paths GET /banking/accounts/{accountId}/direct-debits and /banking/accounts/direct-debits
    (POST batch), plus GET /banking/accounts/{accountId}/payments/scheduled and /banking/payments/scheduled
    (POST batch). Access is mediated by the CDR ADR consent model (OIDC/FAPI + MTLS)
    and requires an active consumer consent and holder-issued access token. The contract
    is the shared DSB Consumer Data Standards Banking API, not a bank-proprietary specification.
