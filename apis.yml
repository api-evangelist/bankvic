    type: APIReference
  - url: openapi/bankvic-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right surface exposing a member's saved
    payees, covering the standardized DSB CDS paths GET /banking/payees and GET /banking/payees/{payeeId}
    for domestic, biller, and international payee detail. Access is mediated by the CDR
    ADR consent model (OIDC/FAPI + MTLS) and requires an active consumer consent and
    holder-issued access token. The contract is the shared DSB Consumer Data Standards
    Banking API, not a bank-proprietary specification.
