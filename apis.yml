name: BankVic
kind: company
description: BankVic is an Australian customer-owned mutual bank and the trading name
  of Police Financial Services Limited, an authorised deposit-taking institution (ADI)
  founded in 1974 and headquartered in Melbourne, Victoria. Member-owned rather than
  shareholder-driven, it has served Victoria's police, health, and emergency-services
  communities and the broader Victorian public under a "people before profits" ethos
  for more than fifty years, offering everyday accounts, home and personal loans,
  term deposits, credit cards, and insurance. As a regulated ADI, BankVic participates
  in Australia's Consumer Data Right (CDR / Open Banking) regime and exposes a public,
  unauthenticated Product Reference Data (PRD) API conforming to the Data Standards
  Body (DSB) Consumer Data Standards, alongside its consented, ADR-mediated consumer
  data-sharing surface.
