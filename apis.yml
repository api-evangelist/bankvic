  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankvic.com.au/get-help/open-banking/
  baseURL: https://ib.bankvic.com.au/openbanking/cds-au/v1/banking/accounts/direct-debits
